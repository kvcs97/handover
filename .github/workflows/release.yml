name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install GTK3/Pango für WeasyPrint (MSYS2)
        run: C:\msys64\usr\bin\pacman.exe --noconfirm -S mingw-w64-x86_64-pango
        shell: cmd

      - name: Build Python backend
        working-directory: backend
        run: |
          pip install pyinstaller==6.19.0
          pyinstaller handover.spec --clean

      - name: Copy backend as Tauri sidecar
        run: |
          mkdir frontend\src-tauri\binaries
          copy backend\dist\handover-backend.exe frontend\src-tauri\binaries\handover-backend-x86_64-pc-windows-msvc.exe
        shell: cmd

      - name: Verify sidecar exists
        run: |
          $path = "frontend\src-tauri\binaries\handover-backend-x86_64-pc-windows-msvc.exe"
          if (Test-Path $path) {
            Write-Host "OK: sidecar found"
            Get-Item $path | Select-Object Name, Length
          } else {
            Write-Error "ERROR: sidecar NOT found!"
            exit 1
          }
        shell: powershell

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        continue-on-error: true   # tauri-action failt manchmal beim latest.json-Upload trotz fertigem Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: 'HandOver ${{ github.ref_name }}'
          releaseBody: |
            ## HandOver ${{ github.ref_name }}

            ### Installation
            - **Standard:** `HandOver_*_x64-setup.exe` herunterladen und ausführen
            - **Ohne Installer (Portable):** `HandOver_*_portable.zip` herunterladen, entpacken, `HandOver.exe` starten

            > Automatisches Update über den Update-Banner in der App verfügbar.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Generate latest.json (fallback wenn tauri-action den Upload verkackt)
        if: always()
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $msiPath = "frontend\src-tauri\target\release\bundle\msi\HandOver_${version}_x64_en-US.msi"
          $exePath = "frontend\src-tauri\target\release\bundle\nsis\HandOver_${version}_x64-setup.exe"

          if (-not (Test-Path "$msiPath.sig") -or -not (Test-Path "$exePath.sig")) {
            Write-Host "Bundle-Sigs nicht vorhanden — Build muss vorher gefailt sein, skip"
            exit 0
          }

          $msiSig  = (Get-Content "$msiPath.sig" -Raw).Trim()
          $exeSig  = (Get-Content "$exePath.sig" -Raw).Trim()
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ss.fffZ")
          $msiUrl  = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/HandOver_${version}_x64_en-US.msi"
          $exeUrl  = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/HandOver_${version}_x64-setup.exe"

          $latest = [ordered]@{
            version  = $version
            notes    = "HandOver ${{ github.ref_name }}"
            pub_date = $pubDate
            platforms = [ordered]@{
              "windows-x86_64"      = [ordered]@{ signature = $msiSig; url = $msiUrl }
              "windows-x86_64-msi"  = [ordered]@{ signature = $msiSig; url = $msiUrl }
              "windows-x86_64-nsis" = [ordered]@{ signature = $exeSig; url = $exeUrl }
            }
          }

          $json = $latest | ConvertTo-Json -Depth 10
          $bytes = [System.Text.UTF8Encoding]::new($false).GetBytes($json)
          [System.IO.File]::WriteAllBytes("latest.json", $bytes)
          Write-Host "latest.json generiert:"
          Get-Content latest.json

      - name: Upload latest.json (idempotent — überschreibt falls schon vorhanden)
        if: hashFiles('latest.json') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build portable ZIP
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $portableDir = "HandOver_portable"

          # Ordner erstellen
          New-Item -ItemType Directory -Force -Path $portableDir

          # Hauptapp + Sidecar-Backend kopieren
          Copy-Item "frontend\src-tauri\target\release\handover.exe" "$portableDir\HandOver.exe"
          Copy-Item "frontend\src-tauri\target\release\handover-backend.exe" "$portableDir\handover-backend.exe"

          # start.bat für einfaches Starten
          @"
          @echo off
          start "" HandOver.exe
          "@ | Out-File -FilePath "$portableDir\start.bat" -Encoding ASCII

          # README
          @"
          HandOver ${{ github.ref_name }} — Portable Version
          ===================================================
          Keine Installation nötig!

          Starten: Doppelklick auf start.bat
          Oder:    HandOver.exe direkt starten

          Hinweis: Beim ersten Start kann Windows SmartScreen eine Warnung zeigen.
          -> "Weitere Informationen" -> "Trotzdem ausführen" klicken.

          © 2026 Shoriu
          "@ | Out-File -FilePath "$portableDir\README.txt" -Encoding UTF8

          # ZIP erstellen
          $zipName = "HandOver_${version}_portable.zip"
          Compress-Archive -Path "$portableDir\*" -DestinationPath $zipName -Force

          Write-Host "Portable ZIP erstellt: $zipName"
          Get-Item $zipName | Select-Object Name, Length
        shell: powershell

      - name: Upload portable ZIP to release
        uses: softprops/action-gh-release@v2
        with:
          files: HandOver_*_portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
