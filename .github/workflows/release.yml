name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Build Python backend
        working-directory: backend
        run: |
          pip install pyinstaller==6.19.0
          pyinstaller --onefile --name handover-backend main.py

      - name: Copy backend to Tauri
        run: copy backend\dist\handover-backend.exe frontend\src-tauri\handover-backend.exe
        shell: cmd

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: 'HandOver ${{ github.ref_name }}'
          releaseBody: |
            Neues Update verfügbar — automatische Installation über den Update-Banner in der App.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
